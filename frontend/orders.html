<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>订单管理 - 校园外卖平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">校园外卖平台 - 商家</a>
            <div class="navbar-nav">
                <a class="nav-link" href="dashboard.html">控制台</a>
                <a class="nav-link" href="products.html">菜品管理</a>
                <a class="nav-link active" href="orders.html">订单管理</a>
                <a class="nav-link" href="refunds.html">退款审核</a>
                <a class="nav-link" href="activities.html">活动运营</a>
                <a class="nav-link" href="shop.html">店铺信息</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>订单管理</h2>
        <table class="table" id="ordersTable">
            <thead>
                <tr>
                    <th>订单ID</th>
                    <th>状态</th>
                    <th>总价</th>
                    <th>下单时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 订单将加载在这里 -->
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载订单
        fetch('/api/orders/merchant/1') // 假设商家ID为1
            .then(response => response.json())
            .then(orders => {
                const tbody = document.querySelector('#ordersTable tbody');
                orders.forEach(order => {
                    const row = `<tr>
                        <td>${order.id}</td>
                        <td>${order.status}</td>
                        <td>${order.totalPrice}</td>
                        <td>${order.orderTime}</td>
                        <td>
                            <select onchange="updateStatus(${order.id}, this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>待支付</option>
                                <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>已支付</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>已完成</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>已取消</option>
                            </select>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        function updateStatus(id, status) {
            fetch(`/api/orders/${id}/status?status=${status}`, { method: 'PUT' })
                .then(() => alert('状态更新成功'));
        }
    </script>
</body>

</html>
