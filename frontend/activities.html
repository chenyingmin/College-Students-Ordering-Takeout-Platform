<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>活动运营 - 校园外卖平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">校园外卖平台 - 商家</a>
            <div class="navbar-nav">
                <a class="nav-link" href="dashboard.html">控制台</a>
                <a class="nav-link" href="products.html">菜品管理</a>
                <a class="nav-link" href="orders.html">订单管理</a>
                <a class="nav-link" href="refunds.html">退款审核</a>
                <a class="nav-link active" href="activities.html">活动运营</a>
                <a class="nav-link" href="shop.html">店铺信息</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>活动运营</h2>
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addActivityModal">发布活动</button>
        <table class="table" id="activitiesTable">
            <thead>
                <tr>
                    <th>类型</th>
                    <th>描述</th>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 活动将加载在这里 -->
            </tbody>
        </table>
    </div>
    <!-- 添加活动模态框 -->
    <div class="modal fade" id="addActivityModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">发布活动</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addActivityForm">
                        <div class="mb-3">
                            <label for="activityType" class="form-label">类型</label>
                            <select class="form-control" id="activityType" required>
                                <option value="promotion">限时优惠</option>
                                <option value="discount">满减活动</option>
                                <option value="new_product">新品上架</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="activityDescription" class="form-label">描述</label>
                            <textarea class="form-control" id="activityDescription" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="startTime" class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-control" id="startTime" required>
                        </div>
                        <div class="mb-3">
                            <label for="endTime" class="form-label">结束时间</label>
                            <input type="datetime-local" class="form-control" id="endTime" required>
                        </div>
                        <button type="submit" class="btn btn-primary">发布</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载活动
        fetch('/api/activities/merchant/1') // 假设商家ID为1
            .then(response => response.json())
            .then(activities => {
                const tbody = document.querySelector('#activitiesTable tbody');
                activities.forEach(activity => {
                    const row = `<tr>
                        <td>${activity.type}</td>
                        <td>${activity.description}</td>
                        <td>${activity.startTime}</td>
                        <td>${activity.endTime}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteActivity(${activity.id})">删除</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        function deleteActivity(id) {
            fetch(`/api/activities/${id}`, { method: 'DELETE' })
                .then(() => location.reload());
        }
        document.getElementById('addActivityForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const type = document.getElementById('activityType').value;
            const description = document.getElementById('activityDescription').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            fetch('/api/activities', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, description, startTime, endTime, merchantId: 1 })
            }).then(() => {
                location.reload();
                bootstrap.Modal.getInstance(document.getElementById('addActivityModal')).hide();
            });
        });
    </script>
</body>

</html>
