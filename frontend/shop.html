<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>店铺信息 - 校园外卖平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">校园外卖平台 - 商家</a>
            <div class="navbar-nav">
                <a class="nav-link" href="dashboard.html">控制台</a>
                <a class="nav-link" href="products.html">菜品管理</a>
                <a class="nav-link" href="orders.html">订单管理</a>
                <a class="nav-link" href="refunds.html">退款审核</a>
                <a class="nav-link" href="activities.html">活动运营</a>
                <a class="nav-link active" href="shop.html">店铺信息</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>店铺信息编辑</h2>
        <form id="shopForm">
            <div class="mb-3">
                <label for="shopName" class="form-label">店铺名称</label>
                <input type="text" class="form-control" id="shopName" required>
            </div>
            <div class="mb-3">
                <label for="shopDescription" class="form-label">描述</label>
                <textarea class="form-control" id="shopDescription"></textarea>
            </div>
            <div class="mb-3">
                <label for="businessHours" class="form-label">营业时间</label>
                <input type="text" class="form-control" id="businessHours" required>
            </div>
            <div class="mb-3">
                <label for="deliveryRange" class="form-label">配送范围</label>
                <input type="text" class="form-control" id="deliveryRange" required>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载店铺信息
        fetch('/api/merchants/1') // 假设商家ID为1
            .then(response => response.json())
            .then(merchant => {
                document.getElementById('shopName').value = merchant.name;
                document.getElementById('shopDescription').value = merchant.description;
                document.getElementById('businessHours').value = merchant.businessHours;
                document.getElementById('deliveryRange').value = merchant.deliveryRange;
            });
        document.getElementById('shopForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('shopName').value;
            const description = document.getElementById('shopDescription').value;
            const businessHours = document.getElementById('businessHours').value;
            const deliveryRange = document.getElementById('deliveryRange').value;
            fetch('/api/merchants/1', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, businessHours, deliveryRange })
            }).then(() => alert('保存成功'));
        });
    </script>
</body>

</html>
