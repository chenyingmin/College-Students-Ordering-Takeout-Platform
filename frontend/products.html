<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>菜品管理 - 校园外卖平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">校园外卖平台 - 商家</a>
            <div class="navbar-nav">
                <a class="nav-link" href="dashboard.html">控制台</a>
                <a class="nav-link active" href="products.html">菜品管理</a>
                <a class="nav-link" href="orders.html">订单管理</a>
                <a class="nav-link" href="refunds.html">退款审核</a>
                <a class="nav-link" href="activities.html">活动运营</a>
                <a class="nav-link" href="shop.html">店铺信息</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>菜品管理</h2>
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addProductModal">添加菜品</button>
        <table class="table" id="productsTable">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>价格</th>
                    <th>销量</th>
                    <th>上架状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 菜品将加载在这里 -->
            </tbody>
        </table>
    </div>
    <!-- 添加菜品模态框 -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加菜品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="mb-3">
                            <label for="productName" class="form-label">名称</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="mb-3">
                            <label for="productPrice" class="form-label">价格</label>
                            <input type="number" class="form-control" id="productPrice" required>
                        </div>
                        <div class="mb-3">
                            <label for="productDescription" class="form-label">描述</label>
                            <textarea class="form-control" id="productDescription"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">添加</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载菜品
        fetch('/api/products/merchant/1') // 假设商家ID为1
            .then(response => response.json())
            .then(products => {
                const tbody = document.querySelector('#productsTable tbody');
                products.forEach(product => {
                    const row = `<tr>
                        <td>${product.name}</td>
                        <td>${product.price}</td>
                        <td>${product.sales}</td>
                        <td>${product.onShelf ? '上架' : '下架'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="toggleShelf(${product.id})">切换上架</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id})">删除</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        function toggleShelf(id) {
            fetch(`/api/products/${id}/toggle-shelf`, { method: 'PUT' })
                .then(() => location.reload());
        }
        function deleteProduct(id) {
            fetch(`/api/products/${id}`, { method: 'DELETE' })
                .then(() => location.reload());
        }
        document.getElementById('addProductForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const description = document.getElementById('productDescription').value;
            fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, description, merchantId: 1, onShelf: true, sales: 0 })
            }).then(() => {
                location.reload();
                bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
            });
        });
    </script>
</body>

</html>
