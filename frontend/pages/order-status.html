<!-- 用户订单状态页面 -->
<!-- 功能：展示订单列表、订单号、商品、状态、取餐提醒 -->
<!-- 包含跳转到退款页面的按钮 -->
<!-- 样式：卡片式布局，适配手机，状态用不同颜色区分 -->
 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单状态 - 校园点餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui;
            background: #f8f9fc;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        .order-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .order-id {
            color: #64748b;
            font-size: 12px;
        }

        .order-status {
            color: #f59e0b;
            font-weight: bold;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>订单状态</h1>
    <div class="order-card">
        <div class="order-header">
            <div class="order-id">订单号: 123456789</div>
            <div class="order-status">待取餐</div>
        </div>
        <div class="order-item">
            <span>麻辣香锅</span>
            <span>1份</span>
        </div>
        <div class="order-item">
            <span>米饭</span>
            <span>1碗</span>
        </div>
        <button style="margin-top: 10px; padding: 8px 16px; background-color: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="window.location.href='refund.html'">申请退款</button>
    </div>
    <!-- 可以添加更多订单卡片 -->
</body>
</html>
