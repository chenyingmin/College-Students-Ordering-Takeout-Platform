<!-- 退款申请页面 -->
<!-- 功能：订单号展示、退款原因选择、备注输入框、提交按钮 -->
<!-- 样式：简洁表单，适配手机，提交后显示成功提示 -->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>申请退款 - 校园点餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui;
            background: #f8f9fc;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #334155;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>申请退款</h1>
        <form>
            <div class="form-group">
                <label for="order-id">订单号</label>
                <input type="text" id="order-id" value="123456789" readonly>
            </div>
            <div class="form-group">
                <label for="refund-reason">退款原因</label>
                <select id="refund-reason">
                    <option value="">请选择退款原因</option>
                    <option value="商品质量问题">商品质量问题</option>
                    <option value="与描述不符">与描述不符</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label for="remark">备注</label>
                <textarea id="remark" rows="4" placeholder="请详细说明退款原因..."></textarea>
            </div>
            <button type="submit">提交退款申请</button>
        </form>
    </div>
</body>
</html>
