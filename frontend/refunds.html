<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>退款审核 - 校园外卖平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">校园外卖平台 - 商家</a>
            <div class="navbar-nav">
                <a class="nav-link" href="dashboard.html">控制台</a>
                <a class="nav-link" href="products.html">菜品管理</a>
                <a class="nav-link" href="orders.html">订单管理</a>
                <a class="nav-link active" href="refunds.html">退款审核</a>
                <a class="nav-link" href="activities.html">活动运营</a>
                <a class="nav-link" href="shop.html">店铺信息</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>退款审核</h2>
        <table class="table" id="refundsTable">
            <thead>
                <tr>
                    <th>退款ID</th>
                    <th>订单ID</th>
                    <th>原因</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 退款将加载在这里 -->
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载退款
        fetch('/api/refunds/merchant/1') // 假设商家ID为1
            .then(response => response.json())
            .then(refunds => {
                const tbody = document.querySelector('#refundsTable tbody');
                refunds.forEach(refund => {
                    const row = `<tr>
                        <td>${refund.id}</td>
                        <td>${refund.orderId}</td>
                        <td>${refund.reason}</td>
                        <td>${refund.status}</td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="updateRefund(${refund.id}, 'approved')">批准</button>
                            <button class="btn btn-sm btn-danger" onclick="updateRefund(${refund.id}, 'rejected')">拒绝</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        function updateRefund(id, status) {
            fetch(`/api/refunds/${id}/status?status=${status}`, { method: 'PUT' })
                .then(() => location.reload());
        }
    </script>
</body>

</html>
